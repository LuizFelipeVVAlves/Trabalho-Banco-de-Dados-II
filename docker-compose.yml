services:
  postgres:
    image: postgres:16
    container_name: bd2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bd2
      POSTGRES_PASSWORD: bd2
      POSTGRES_DB: bd2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bd2 -d bd2"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
